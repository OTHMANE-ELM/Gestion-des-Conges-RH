<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Type de congé')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/menu :: menu}" th:with="activePage='types'"></div>
    <div class="main-content flex-grow-1">

        <div class="mb-4">
            <h2 class="fw-bold mb-1">
                <i class="bi bi-tag-fill text-success me-2"></i>
                <span th:text="${typeConge.id == null} ? 'Nouveau type de congé' : 'Modifier le type'"></span>
            </h2>
            <p class="text-muted mb-0">Définissez un type de congé et son quota annuel</p>
        </div>

        <div class="card p-4" style="max-width:480px;">
            <form th:action="@{/types-conge/save}" th:object="${typeConge}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Libellé du type de congé</label>
                    <input type="text" class="form-control" th:field="*{libelle}"
                           placeholder="Ex : Congé annuel, Maladie, Maternité..." required/>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Quota annuel (jours)</label>
                    <div class="input-group">
                        <input type="number" class="form-control" th:field="*{quotaAnnuel}"
                               placeholder="Ex : 30" min="1" max="365" required/>
                        <span class="input-group-text">jours / an</span>
                    </div>
                    <div class="form-text">Nombre de jours maximum autorisés par an pour ce type.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-check-lg me-1"></i> Enregistrer
                    </button>
                    <a href="/types-conge" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i> Annuler
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
