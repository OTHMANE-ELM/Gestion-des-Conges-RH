<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Employé')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/menu :: menu}" th:with="activePage='employes'"></div>
    <div class="main-content flex-grow-1">

        <div class="mb-4">
            <h2 class="fw-bold mb-1">
                <i class="bi bi-person-fill text-primary me-2"></i>
                <span th:text="${employe.id == null} ? 'Nouvel employé' : 'Modifier l\'employé'"></span>
            </h2>
            <p class="text-muted mb-0">Renseignez les informations de l'employé</p>
        </div>

        <div class="card p-4" style="max-width:540px;">
            <form th:action="@{/employes/save}" th:object="${employe}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Nom complet</label>
                    <input type="text" class="form-control" th:field="*{nom}" placeholder="Ex : Ahmed Benali" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Département</label>
                    <input type="text" class="form-control" th:field="*{departement}" placeholder="Ex : Informatique, RH, Finance..." required/>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Date d'embauche</label>
                    <input type="date" class="form-control" th:field="*{dateEmbauche}" required/>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i> Enregistrer
                    </button>
                    <a href="/employes" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i> Annuler
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
