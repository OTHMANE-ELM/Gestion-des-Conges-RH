<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Employés')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/menu :: menu}" th:with="activePage='employes'"></div>
    <div class="main-content flex-grow-1">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1"><i class="bi bi-people-fill text-primary me-2"></i>Employés</h2>
                <p class="text-muted mb-0">Liste de tous les employés enregistrés</p>
            </div>
            <a href="/employes/new" class="btn btn-primary">
                <i class="bi bi-person-plus me-1"></i> Nouvel employé
            </a>
        </div>

        <!-- Recherche -->
        <div class="card p-3 mb-4">
            <form method="get" action="/employes" class="d-flex gap-2">
                <input type="text" name="nom" class="form-control" placeholder="Rechercher par nom..." th:value="${nom}"/>
                <button type="submit" class="btn btn-outline-primary px-4">
                    <i class="bi bi-search"></i>
                </button>
                <a href="/employes" class="btn btn-outline-secondary">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>
        </div>

        <!-- Tableau -->
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Nom</th>
                            <th>Département</th>
                            <th>Date d'embauche</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(employes)}">
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-4 d-block mb-1"></i> Aucun employé trouvé.
                            </td>
                        </tr>
                        <tr th:each="emp : ${employes}">
                            <td class="text-muted small" th:text="${emp.id}"></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                                         style="width:36px;height:36px;font-size:.85rem;font-weight:600;"
                                         th:text="${#strings.substring(emp.nom,0,1).toUpperCase()}">A</div>
                                    <span class="fw-semibold" th:text="${emp.nom}"></span>
                                </div>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark border" th:text="${emp.departement}"></span>
                            </td>
                            <td th:text="${#temporals.format(emp.dateEmbauche,'dd/MM/yyyy')}"></td>
                            <td class="text-end">
                                <a th:href="@{/employes/edit/{id}(id=${emp.id})}" class="btn btn-sm btn-outline-warning me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/employes/delete/{id}(id=${emp.id})}"
                                   onclick="return confirm('Supprimer cet employé ?')"
                                   class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer text-muted small" th:text="'Total : ' + ${employes.size()} + ' employé(s)'"></div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
