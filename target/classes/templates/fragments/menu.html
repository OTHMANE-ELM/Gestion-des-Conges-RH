<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="menu">
    <div class="sidebar d-flex flex-column p-0" style="width:230px; min-width:230px;">
        <div class="brand d-flex align-items-center gap-2 px-3 py-3">
            <i class="bi bi-briefcase-fill text-warning fs-5"></i>
            <span>RH – Congés</span>
        </div>
        <nav class="nav flex-column pt-2 flex-grow-1">
            <a class="nav-link d-flex align-items-center gap-2" th:classappend="${activePage == 'home'} ? 'active'" href="/">
                <i class="bi bi-house-door"></i> Accueil
            </a>
            <a class="nav-link d-flex align-items-center gap-2" th:classappend="${activePage == 'employes'} ? 'active'" href="/employes">
                <i class="bi bi-people"></i> Employés
            </a>
            <a class="nav-link d-flex align-items-center gap-2" th:classappend="${activePage == 'types'} ? 'active'" href="/types-conge">
                <i class="bi bi-tag"></i> Types de congé
            </a>
            <a class="nav-link d-flex align-items-center gap-2" th:classappend="${activePage == 'demandes'} ? 'active'" href="/demandes">
                <i class="bi bi-file-earmark-text"></i> Demandes
            </a>
            <a class="nav-link d-flex align-items-center gap-2" th:classappend="${activePage == 'stats'} ? 'active'" href="/stats">
                <i class="bi bi-bar-chart-line"></i> Statistiques
            </a>
        </nav>
    </div>
</div>
</body>
</html>
